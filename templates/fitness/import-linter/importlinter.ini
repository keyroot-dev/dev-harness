# アーキテクチャ境界 Fitness Function（Python 用の最小サンプル / import-linter）。
#
# 使い方（プロジェクトルートで）:
#   cp templates/fitness/import-linter/importlinter.ini .importlinter
#   pip install import-linter
#   lint-imports
#
# ルールの意味（正本: .claude/skills/architecture-design/guide.md「依存性のルール」）:
#   layers 契約は「上の層は下の層を import できるが、逆は error」。
#   依存はすべて内向き（infrastructure → adapters → use_cases → entities）。
#   パッケージ名は実プロジェクトに合わせて直す（ルールの意味は変えない）。

[importlinter]
root_package = src

# レイヤ境界: 外側ほど上に書く（上→下の import のみ許可 = 依存は内向き）
[importlinter:contract:layers]
name = 依存はすべて内向き（レイヤ境界）
type = layers
layers =
    src.infrastructure
    src.adapters
    src.use_cases
    src.entities

# 機能優先の構造（src/<機能>/<レイヤ>）に移行したら、機能間の独立も契約に追加する:
# [importlinter:contract:features]
# name = 機能領域は互いに独立（共有は shared 経由のみ）
# type = independence
# modules =
#     src.task_management
#     src.archiving
